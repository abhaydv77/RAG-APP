<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f0f;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 700px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        h1 {
            text-align: center;
            font-size: 24px;
            color: #a78bfa;
        }

        .upload-section {
            background: #1a1a1a;
            border: 2px dashed #a78bfa;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .upload-section input {
            display: none;
        }

        .upload-label {
            cursor: pointer;
            color: #a78bfa;
            font-size: 15px;
        }

        .upload-btn {
            margin-top: 10px;
            background: #a78bfa;
            color: #000;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .upload-btn:hover { background: #7c3aed; color: #fff; }

        .status {
            font-size: 13px;
            color: #86efac;
            margin-top: 8px;
        }

        .chat-box {
            flex: 1;
            background: #1a1a1a;
            border-radius: 12px;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 14px;
            line-height: 1.5;
        }

        .user-msg {
            background: #a78bfa;
            color: #000;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .ai-msg {
            background: #2a2a2a;
            color: #fff;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .input-section {
            display: flex;
            gap: 10px;
        }

        .input-section input {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 12px 16px;
            color: #fff;
            font-size: 14px;
            outline: none;
        }

        .input-section input:focus { border-color: #a78bfa; }

        .send-btn {
            background: #a78bfa;
            color: #000;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        .send-btn:hover { background: #7c3aed; color: #fff; }

        .thinking {
            color: #666;
            font-size: 13px;
            align-self: flex-start;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📄 RAG Chat</h1>

       <div class="upload-section">
    <label class="upload-label" for="pdfInput">
        📁 Click here to select your PDF file (max 25MB)
    </label>
    <input type="file" id="pdfInput" accept=".pdf" onchange="showFileName()">
    <p id="fileName" style="color:#a78bfa; margin-top:8px; font-size:13px;"></p>
    <br>
    <button class="upload-btn" onclick="uploadPDF()">⬆️ Upload PDF</button>
    <p class="status" id="uploadStatus"></p>
</div>
    <script>
        async function showFileName() {
    const file = document.getElementById('pdfInput').files[0];
    const fileName = document.getElementById('fileName');
    if (file) {
        fileName.textContent = '✅ Selected: ' + file.name + ' — Now click Upload PDF button';
    }
}

            status.style.color = '#fbbf24';
            status.textContent = 'Uploading...';

            const formData = new FormData();
            formData.append('file', file);

            try {
                const res = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();

                if (res.ok) {
                    status.style.color = '#86efac';
                    status.textContent = '✅ ' + data.message;
                    document.getElementById('questionInput').disabled = false;
                    document.getElementById('sendBtn').disabled = false;
                    document.getElementById('questionInput').placeholder = 'Apna question likho...';
                } else {
                    status.style.color = '#f87171';
                    status.textContent = '❌ ' + data.detail;
                }
            } catch (e) {
                status.style.color = '#f87171';
                status.textContent = '❌ Error aaya, dobara try karo';
            }
        }

        async function askQuestion() {
            const input = document.getElementById('questionInput');
            const chatBox = document.getElementById('chatBox');
            const question = input.value.trim();

            if (!question) return;

            // user message
            chatBox.innerHTML += `<div class="message user-msg">${question}</div>`;
            input.value = '';
            chatBox.innerHTML += `<div class="message thinking" id="thinking">AI soch raha hai...</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const res = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question })
                });
                const data = await res.json();

                document.getElementById('thinking').remove();

                if (res.ok) {
                    chatBox.innerHTML += `<div class="message ai-msg">${data.answer}</div>`;
                } else {
                    chatBox.innerHTML += `<div class="message ai-msg" style="color:#f87171">${data.detail}</div>`;
                }
            } catch (e) {
                document.getElementById('thinking').remove();
                chatBox.innerHTML += `<div class="message ai-msg" style="color:#f87171">Error aaya!</div>`;
            }

            chatBox.scrollTop = chatBox.scrollHeight;

            // enter key se bhi bhej sako
            document.getElementById('questionInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') askQuestion();
            });
        }
    </script>
</body>
</html>
